name: Update Fisch Price History

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: scraper-fisch

      - name: Update price history
        id: scrape
        run: node scraper-fisch/src/sources/update-price-history.js
        continue-on-error: true

      - name: Copy to Astro (enrich items with new price data)
        if: steps.scrape.outcome == 'success'
        run: node scraper-fisch/src/copy-to-astro.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper-fisch/data/price-history.json
          git add src/data/games/fisch/
          if ! git diff --staged --quiet; then
            git commit -m "data: price history $(date +%Y-%m-%d)"
            git push
          fi

      - name: Log failure
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "::error::Price history scrape failed"
          exit 1
