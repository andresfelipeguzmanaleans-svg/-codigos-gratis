name: Fisch Data Scraper

on:
  schedule:
    - cron: '0 8 * * 0'  # Domingos 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: scraper-fisch

      - name: Run all scrapers
        run: node scraper-fisch/src/run-all.js
        continue-on-error: true

      - name: Detect new items
        id: detect
        run: |
          TV="scraper-fisch/data/trade-values.json"
          if [ -f "$TV" ]; then
            NEW_COUNT=$(node -e "const d=require('./$TV'); console.log(d.newItems||0)")
            REMOVED_COUNT=$(node -e "const d=require('./$TV'); console.log(d.removedItems||0)")
            echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"
            echo "removed_count=$REMOVED_COUNT" >> "$GITHUB_OUTPUT"
            if [ "$NEW_COUNT" -gt 0 ] || [ "$REMOVED_COUNT" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "summary=+${NEW_COUNT} new, -${REMOVED_COUNT} removed" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "summary=no item changes" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "summary=first run" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper-fisch/data/
          git add src/data/games/fisch/
          git diff --staged --quiet || git commit -m "data: actualizacion Fisch $(date +%Y-%m-%d) (${{ steps.detect.outputs.summary }})"
          git push
